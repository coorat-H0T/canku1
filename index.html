<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄罗斯方块</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a2e;
            font-family: 'Microsoft YaHei', sans-serif;
        }

        .game-wrapper {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        .left-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        canvas {
            border: 2px solid #eee;
            background: #0f0f23;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
        }

        .info-panel {
            background: #16213e;
            padding: 15px;
            border-radius: 8px;
            color: #eee;
            min-width: 150px;
        }

        .info-panel h3 {
            margin-bottom: 10px;
            color: #00d4ff;
            font-size: 16px;
        }

        .info-value {
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 15px;
        }

        .next-piece canvas {
            display: block;
            margin: 0 auto;
            border: 1px solid #444;
            background: #0f0f23;
        }

        .controls {
            background: #16213e;
            padding: 15px;
            border-radius: 8px;
            color: #aaa;
            font-size: 13px;
            line-height: 1.8;
        }

        .controls h3 {
            color: #00d4ff;
            margin-bottom: 10px;
        }

        .controls kbd {
            background: #333;
            padding: 2px 8px;
            border-radius: 4px;
            color: #fff;
            font-family: monospace;
        }

        .btn {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 6px;
            background: #e94560;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn:hover {
            background: #ff6b6b;
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 30px 50px;
            border-radius: 10px;
            text-align: center;
            color: #fff;
            display: none;
        }

        .game-over h2 {
            color: #e94560;
            font-size: 32px;
            margin-bottom: 15px;
        }

        .canvas-wrapper {
            position: relative;
            text-align: center;
        }

        .game-title {
            color: #00d4ff;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 12px;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
            letter-spacing: 4px;
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <div class="left-panel">
            <div class="info-panel">
                <h3>得分</h3>
                <div class="info-value" id="score">0</div>
                <h3>等级</h3>
                <div class="info-value" id="level">1</div>
                <h3>消除行数</h3>
                <div class="info-value" id="lines">0</div>
            </div>
            <div class="info-panel">
                <h3>下一个</h3>
                <canvas id="next" width="120" height="120"></canvas>
            </div>
        </div>

        <div class="canvas-wrapper">
            <div class="game-title">袁大师的俄罗斯方块</div>
            <canvas id="game" width="300" height="600"></canvas>
            <div class="game-over" id="gameOver">
                <h2>游戏结束</h2>
                <p>最终得分: <span id="finalScore">0</span></p>
                <button class="btn" onclick="game.restart()">重新开始</button>
            </div>
        </div>

        <div class="controls">
            <h3>操作说明</h3>
            <p><kbd>←</kbd> <kbd>→</kbd> 左右移动</p>
            <p><kbd>↓</kbd> 加速下落</p>
            <p><kbd>↑</kbd> 旋转</p>
            <p><kbd>空格</kbd> 直接落地</p>
            <p><kbd>P</kbd> 暂停</p>
            <button class="btn" onclick="game.restart()">新游戏</button>
        </div>
    </div>

    <script>
        const COLS = 10;
        const ROWS = 20;
        const BLOCK_SIZE = 30;

        const COLORS = {
            I: '#00f5ff',
            O: '#ffeb3b',
            T: '#e040fb',
            S: '#76ff03',
            Z: '#ff5252',
            J: '#448aff',
            L: '#ff9100'
        };

        const SHAPES = {
            I: [[1, 1, 1, 1]],
            O: [[1, 1], [1, 1]],
            T: [[0, 1, 0], [1, 1, 1]],
            S: [[0, 1, 1], [1, 1, 0]],
            Z: [[1, 1, 0], [0, 1, 1]],
            J: [[1, 0, 0], [1, 1, 1]],
            L: [[0, 0, 1], [1, 1, 1]]
        };

        const PIECE_TYPES = Object.keys(SHAPES);

        class Piece {
            constructor(type) {
                this.type = type;
                this.shape = SHAPES[type];
                this.color = COLORS[type];
                this.x = Math.floor((COLS - this.shape[0].length) / 2);
                this.y = 0;
            }

            rotate() {
                const newShape = [];
                for (let i = 0; i < this.shape[0].length; i++) {
                    newShape[i] = [];
                    for (let j = this.shape.length - 1; j >= 0; j--) {
                        newShape[i].push(this.shape[j][i]);
                    }
                }
                return newShape;
            }
        }

        class Tetris {
            constructor() {
                this.canvas = document.getElementById('game');
                this.ctx = this.canvas.getContext('2d');
                this.nextCanvas = document.getElementById('next');
                this.nextCtx = this.nextCanvas.getContext('2d');

                this.board = Array(ROWS).fill(null).map(() => Array(COLS).fill(0));
                this.score = 0;
                this.lines = 0;
                this.level = 1;
                this.dropCounter = 0;
                this.dropInterval = 1000;
                this.lastTime = 0;
                this.paused = false;
                this.gameOver = false;
                this.currentPiece = null;
                this.nextPiece = this.randomPiece();

                this.spawnPiece();
                this.bindEvents();
                this.update(0);
            }

            randomPiece() {
                const type = PIECE_TYPES[Math.floor(Math.random() * PIECE_TYPES.length)];
                return new Piece(type);
            }

            spawnPiece() {
                this.currentPiece = this.nextPiece;
                this.nextPiece = this.randomPiece();
                this.drawNext();

                if (this.collides(this.currentPiece, this.currentPiece.x, this.currentPiece.y)) {
                    this.endGame();
                }
            }

            collides(piece, x, y, shape = null) {
                const s = shape || piece.shape;
                for (let row = 0; row < s.length; row++) {
                    for (let col = 0; col < s[row].length; col++) {
                        if (s[row][col]) {
                            const newX = x + col;
                            const newY = y + row;
                            if (newX < 0 || newX >= COLS || newY >= ROWS) return true;
                            if (newY >= 0 && this.board[newY][newX]) return true;
                        }
                    }
                }
                return false;
            }

            merge() {
                const { shape, x, y, color } = this.currentPiece;
                for (let row = 0; row < shape.length; row++) {
                    for (let col = 0; col < shape[row].length; col++) {
                        if (shape[row][col]) {
                            const boardY = y + row;
                            if (boardY >= 0) {
                                this.board[boardY][x + col] = color;
                            }
                        }
                    }
                }
            }

            clearLines() {
                let linesCleared = 0;
                for (let row = ROWS - 1; row >= 0; row--) {
                    if (this.board[row].every(cell => cell !== 0)) {
                        this.board.splice(row, 1);
                        this.board.unshift(Array(COLS).fill(0));
                        linesCleared++;
                        row++;
                    }
                }

                if (linesCleared > 0) {
                    const points = [0, 100, 300, 500, 800];
                    this.score += points[linesCleared] * this.level;
                    this.lines += linesCleared;
                    this.level = Math.floor(this.lines / 10) + 1;
                    this.dropInterval = Math.max(100, 1000 - (this.level - 1) * 100);
                    this.updateInfo();
                }
            }

            move(dx, dy) {
                if (this.gameOver || this.paused) return;
                const newX = this.currentPiece.x + dx;
                const newY = this.currentPiece.y + dy;
                if (!this.collides(this.currentPiece, newX, newY)) {
                    this.currentPiece.x = newX;
                    this.currentPiece.y = newY;
                    return true;
                }
                return false;
            }

            rotate() {
                if (this.gameOver || this.paused) return;
                const newShape = this.currentPiece.rotate();
                let newX = this.currentPiece.x;

                // Wall kick
                const kicks = [0, -1, 1, -2, 2];
                for (const kick of kicks) {
                    if (!this.collides(this.currentPiece, newX + kick, this.currentPiece.y, newShape)) {
                        this.currentPiece.shape = newShape;
                        this.currentPiece.x = newX + kick;
                        return;
                    }
                }
            }

            hardDrop() {
                if (this.gameOver || this.paused) return;
                while (this.move(0, 1)) {
                    this.score += 2;
                }
                this.lockPiece();
            }

            lockPiece() {
                this.merge();
                this.clearLines();
                this.spawnPiece();
            }

            drop() {
                if (!this.move(0, 1)) {
                    this.lockPiece();
                } else {
                    this.score += 1;
                    this.updateInfo();
                }
            }

            update(time = 0) {
                if (this.gameOver) return;

                const deltaTime = time - this.lastTime;
                this.lastTime = time;

                if (!this.paused) {
                    this.dropCounter += deltaTime;
                    if (this.dropCounter > this.dropInterval) {
                        this.drop();
                        this.dropCounter = 0;
                    }
                }

                this.draw();
                requestAnimationFrame((t) => this.update(t));
            }

            draw() {
                // Clear canvas
                this.ctx.fillStyle = '#0f0f23';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

                // Draw grid lines
                this.ctx.strokeStyle = '#1a1a3e';
                this.ctx.lineWidth = 1;
                for (let x = 0; x <= COLS; x++) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(x * BLOCK_SIZE, 0);
                    this.ctx.lineTo(x * BLOCK_SIZE, this.canvas.height);
                    this.ctx.stroke();
                }
                for (let y = 0; y <= ROWS; y++) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(0, y * BLOCK_SIZE);
                    this.ctx.lineTo(this.canvas.width, y * BLOCK_SIZE);
                    this.ctx.stroke();
                }

                // Draw board
                for (let row = 0; row < ROWS; row++) {
                    for (let col = 0; col < COLS; col++) {
                        if (this.board[row][col]) {
                            this.drawBlock(this.ctx, col, row, this.board[row][col]);
                        }
                    }
                }

                // Draw current piece
                if (this.currentPiece) {
                    const { shape, x, y, color } = this.currentPiece;

                    // Ghost piece
                    let ghostY = y;
                    while (!this.collides(this.currentPiece, x, ghostY + 1)) {
                        ghostY++;
                    }
                    for (let row = 0; row < shape.length; row++) {
                        for (let col = 0; col < shape[row].length; col++) {
                            if (shape[row][col]) {
                                this.ctx.globalAlpha = 0.3;
                                this.drawBlock(this.ctx, x + col, ghostY + row, color);
                                this.ctx.globalAlpha = 1;
                            }
                        }
                    }

                    // Actual piece
                    for (let row = 0; row < shape.length; row++) {
                        for (let col = 0; col < shape[row].length; col++) {
                            if (shape[row][col]) {
                                this.drawBlock(this.ctx, x + col, y + row, color);
                            }
                        }
                    }
                }
            }

            drawBlock(ctx, x, y, color) {
                const px = x * BLOCK_SIZE;
                const py = y * BLOCK_SIZE;

                // Main block
                ctx.fillStyle = color;
                ctx.fillRect(px + 1, py + 1, BLOCK_SIZE - 2, BLOCK_SIZE - 2);

                // Highlight
                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.fillRect(px + 1, py + 1, BLOCK_SIZE - 2, 4);
                ctx.fillRect(px + 1, py + 1, 4, BLOCK_SIZE - 2);

                // Shadow
                ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
                ctx.fillRect(px + 1, py + BLOCK_SIZE - 5, BLOCK_SIZE - 2, 4);
                ctx.fillRect(px + BLOCK_SIZE - 5, py + 1, 4, BLOCK_SIZE - 2);
            }

            drawNext() {
                const ctx = this.nextCtx;
                ctx.fillStyle = '#0f0f23';
                ctx.fillRect(0, 0, this.nextCanvas.width, this.nextCanvas.height);

                if (!this.nextPiece) return;

                const { shape, color } = this.nextPiece;
                const blockSize = 25;
                const offsetX = (this.nextCanvas.width - shape[0].length * blockSize) / 2;
                const offsetY = (this.nextCanvas.height - shape.length * blockSize) / 2;

                for (let row = 0; row < shape.length; row++) {
                    for (let col = 0; col < shape[row].length; col++) {
                        if (shape[row][col]) {
                            const px = offsetX + col * blockSize;
                            const py = offsetY + row * blockSize;

                            ctx.fillStyle = color;
                            ctx.fillRect(px + 1, py + 1, blockSize - 2, blockSize - 2);
                            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                            ctx.fillRect(px + 1, py + 1, blockSize - 2, 3);
                            ctx.fillRect(px + 1, py + 1, 3, blockSize - 2);
                            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
                            ctx.fillRect(px + 1, py + blockSize - 4, blockSize - 2, 3);
                            ctx.fillRect(px + blockSize - 4, py + 1, 3, blockSize - 2);
                        }
                    }
                }
            }

            updateInfo() {
                document.getElementById('score').textContent = this.score;
                document.getElementById('level').textContent = this.level;
                document.getElementById('lines').textContent = this.lines;
            }

            endGame() {
                this.gameOver = true;
                document.getElementById('finalScore').textContent = this.score;
                document.getElementById('gameOver').style.display = 'block';
            }

            restart() {
                this.board = Array(ROWS).fill(null).map(() => Array(COLS).fill(0));
                this.score = 0;
                this.lines = 0;
                this.level = 1;
                this.dropInterval = 1000;
                this.dropCounter = 0;
                this.paused = false;
                this.gameOver = false;
                this.currentPiece = null;
                this.nextPiece = this.randomPiece();
                document.getElementById('gameOver').style.display = 'none';
                this.spawnPiece();
                this.updateInfo();
                this.update(0);
            }

            togglePause() {
                if (this.gameOver) return;
                this.paused = !this.paused;
            }

            bindEvents() {
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'ArrowLeft') {
                        e.preventDefault();
                        this.move(-1, 0);
                    } else if (e.key === 'ArrowRight') {
                        e.preventDefault();
                        this.move(1, 0);
                    } else if (e.key === 'ArrowDown') {
                        e.preventDefault();
                        this.drop();
                        this.dropCounter = 0;
                    } else if (e.key === 'ArrowUp') {
                        e.preventDefault();
                        this.rotate();
                    } else if (e.key === ' ') {
                        e.preventDefault();
                        this.hardDrop();
                    } else if (e.key === 'p' || e.key === 'P') {
                        e.preventDefault();
                        this.togglePause();
                    }
                });
            }
        }

        const game = new Tetris();
    </script>
</body>
</html>
